name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax check
        run: |
          for f in core1.js core2.js ocr.js; do node --check "$f"; done
      - name: Run tests
        run: node tests/run-all.js
