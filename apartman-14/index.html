<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="theme-color" content="#1e3a34">
  <title>Apartmán 14 · Školská 9</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#faf7f1}
    iframe{display:block;width:100%;height:100%;border:0}
  </style>
</head>
<body>
  <iframe id="site" title="Apartmán 14" allow="clipboard-write"></iframe>
  <script>
    const frame=document.getElementById('site');

    function setFrameSource(){
      frame.src='../ap14-k7x2/'+(location.hash||'#4824');
    }

    function enhanceTaxCalculator(){
      const doc=frame.contentDocument;
      const win=frame.contentWindow;
      if(!doc)return;

      const style=doc.createElement('style');
      style.textContent=`
        .tax-direct-input{
          appearance:none!important;-webkit-appearance:none!important;
          display:block!important;width:100%!important;height:60px!important;
          padding:0 14px!important;border:2px solid #d9d1c3!important;
          border-radius:15px!important;background:#fff!important;color:#1e3a34!important;
          font:800 24px/1 system-ui,-apple-system,Segoe UI,sans-serif!important;
          text-align:center!important;box-shadow:0 3px 12px rgba(30,58,52,.08)!important;
          cursor:text!important;touch-action:manipulation!important;
          -moz-appearance:textfield!important
        }
        .tax-direct-input::-webkit-inner-spin-button,
        .tax-direct-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
        .tax-direct-input:focus{
          outline:3px solid rgba(185,138,60,.22)!important;
          border-color:#b98a3c!important
        }
        @media(max-width:370px){.tax-direct-input{height:56px!important;font-size:22px!important}}
      `;
      doc.head.appendChild(style);

      function showZeroWhileEmpty(){
        const persons=doc.getElementById('taxPersons');
        const nights=doc.getElementById('taxNights');
        const formula=doc.getElementById('taxFormula');
        const result=doc.getElementById('taxResult');
        if(!persons||!nights)return;
        const p=persons.value===''?0:Number(persons.value);
        const n=nights.value===''?0:Number(nights.value);
        if(formula)formula.textContent=`${p||0} × ${n||0} × 2 €`;
        if(result)result.textContent=`${p*n*2} €`;
      }

      function makeEditable(id,max,digits){
        const input=doc.getElementById(id);
        if(!input||input.dataset.mobileTyping==='ready')return;

        input.dataset.mobileTyping='ready';
        input.type='text';
        input.inputMode='numeric';
        input.pattern='[0-9]*';
        input.maxLength=digits;
        input.autocomplete='off';
        input.setAttribute('enterkeyhint','done');
        input.classList.add('tax-direct-input');
        input.removeAttribute('min');
        input.removeAttribute('max');
        input.removeAttribute('step');
        input.removeAttribute('onfocus');
        input.removeAttribute('onclick');
        input.removeAttribute('oninput');
        input.removeAttribute('onblur');

        const selectValue=()=>setTimeout(()=>{
          try{input.setSelectionRange(0,input.value.length)}catch(_){input.select()}
        },0);

        input.addEventListener('focus',selectValue);
        input.addEventListener('click',selectValue);
        input.addEventListener('input',()=>{
          let value=(input.value||'').replace(/\D/g,'');
          if(value.length>1)value=value.replace(/^0+/,'');
          if(value!==''&&Number(value)>max)value=String(max);
          if(input.value!==value)input.value=value;
          if(value==='')showZeroWhileEmpty();
          else if(typeof win.updateTaxCalculator==='function')win.updateTaxCalculator();
        });
        input.addEventListener('blur',()=>{
          let value=parseInt(input.value,10);
          if(!Number.isFinite(value)||value<1)value=1;
          if(value>max)value=max;
          input.value=String(value);
          if(typeof win.updateTaxCalculator==='function')win.updateTaxCalculator();
        });
      }

      makeEditable('taxPersons',50,2);
      makeEditable('taxNights',365,3);
    }

    frame.addEventListener('load',()=>{
      try{enhanceTaxCalculator()}catch(error){console.warn('Calculator enhancement failed',error)}
    });

    window.addEventListener('hashchange',setFrameSource);
    setFrameSource();
  </script>
</body>
</html>
